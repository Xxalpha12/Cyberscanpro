<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060c14">
<title>CyberScan Pro — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #060c14;
  --bg2:    #0a1220;
  --bg3:    #0f1a2e;
  --accent: #00c8ff;
  --green:  #00ff9d;
  --red:    #ef4444;
  --text:   #f1f5f9;
  --text2:  #3d5a70;
  --border: rgba(0,200,255,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; min-height: 100dvh;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  position: relative;
}

/* ── SAME BACKGROUND AS DASHBOARD ────────────────────── */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Scan line effect */
.bg-scan {
  position: fixed; inset: 0; z-index: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  animation: scanmove 15s linear infinite;
}
@keyframes scanmove { from{background-position:0 0} to{background-position:0 100%} }

/* Glow orb */
.bg-glow {
  position: fixed; z-index: 0;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,200,255,0.04) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* Corner accents */
.corner {
  position: fixed; z-index: 0;
  width: 200px; height: 200px;
  pointer-events: none;
  opacity: 0.4;
}
.corner-tl { top: 0; left: 0; border-top: 1px solid var(--accent); border-left: 1px solid var(--accent); }
.corner-tr { top: 0; right: 0; border-top: 1px solid var(--accent); border-right: 1px solid var(--accent); }
.corner-bl { bottom: 0; left: 0; border-bottom: 1px solid var(--accent); border-left: 1px solid var(--accent); }
.corner-br { bottom: 0; right: 0; border-bottom: 1px solid var(--accent); border-right: 1px solid var(--accent); }

/* ── LAYOUT ───────────────────────────────────────────── */
.container {
  position: relative; z-index: 1;
  width: 100%; max-width: 460px;
  display: flex; flex-direction: column; gap: 16px;
}

/* ── TERMINAL BOOT ────────────────────────────────────── */
.terminal {
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(0,200,255,0.15);
  border-radius: 10px;
  overflow: hidden;
  font-family: 'Share Tech Mono', monospace;
}
.terminal-bar {
  background: #0a0a0a;
  padding: 8px 14px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid rgba(0,200,255,0.1);
}
.tdot { width: 10px; height: 10px; border-radius: 50%; }
.tdot.r { background: #ff5f57; }
.tdot.y { background: #ffbd2e; }
.tdot.g { background: #27c93f; }
.terminal-title {
  font-size: 10px; color: var(--accent);
  letter-spacing: 2px; margin-left: 6px;
}
.terminal-body {
  padding: 14px 16px;
  font-size: clamp(10px, 2.8vw, 12px);
  line-height: 1.9;
  min-height: 120px;
}
.tline { display: flex; gap: 8px; opacity: 0; animation: tappear 0.1s ease forwards; }
.tline .prompt { color: var(--accent); flex-shrink: 0; }
.tline.ok   .msg { color: var(--green); }
.tline.warn .msg { color: #ffaa00; }
.tline.err  .msg { color: var(--red); }
.tline.info .msg { color: var(--accent); }
.tline.dim  .msg { color: var(--text2); }
.tline.white .msg { color: var(--text); }
.cursor-blink {
  display: inline-block; width: 8px; height: 13px;
  background: var(--accent);
  animation: blink 1s step-end infinite;
  vertical-align: middle; margin-left: 4px;
}
@keyframes blink { 50% { opacity: 0; } }
@keyframes tappear { to { opacity: 1; } }

/* ── LOGIN CARD ───────────────────────────────────────── */
.card {
  background: rgba(10,18,32,0.95);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  backdrop-filter: blur(10px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,200,255,0.05);
  animation: fadeUp 0.4s ease both 1.8s;
  opacity: 0;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.card-top {
  background: var(--bg3);
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.card-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px; color: var(--accent);
  letter-spacing: 2px; margin-left: 6px;
}

.card-body { padding: 24px 22px; }

/* Logo inside card */
.card-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 22px;
}
.card-logo-icon {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, rgba(0,200,255,0.15), rgba(0,200,255,0.05));
  border: 1px solid rgba(0,200,255,0.2);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}
.card-logo-text {}
.card-logo-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; font-weight: 700;
  color: var(--text); letter-spacing: 1px;
}
.card-logo-name span { color: var(--accent); }
.card-logo-sub { font-size: 10px; color: var(--text2); margin-top: 2px; letter-spacing: 1px; }

/* Error */
.error {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: 8px; padding: 10px 14px;
  margin-bottom: 18px; font-size: 12px;
  color: var(--red); display: flex;
  align-items: center; gap: 8px;
}

/* Fields */
.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 10px; font-weight: 600;
  color: var(--text2); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 8px;
  font-family: 'Share Tech Mono', monospace;
}
.input-wrap { position: relative; display: flex; align-items: center; }
.input-icon {
  position: absolute; left: 14px;
  color: var(--text2); font-size: 15px; pointer-events: none;
}
.field input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 13px 14px 13px 42px;
  color: var(--text); font-size: 15px;
  font-family: 'Share Tech Mono', monospace;
  outline: none; transition: all 0.2s;
  -webkit-appearance: none;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,200,255,0.08);
  background: rgba(0,200,255,0.02);
}
.field input::placeholder { color: var(--text2); font-size: 13px; }

.toggle-pass {
  position: absolute; right: 12px;
  background: none; border: none;
  color: var(--text2); cursor: pointer; padding: 4px;
  font-size: 15px; transition: color 0.2s;
}
.toggle-pass:hover { color: var(--accent); }

/* Submit button */
.btn-login {
  width: 100%;
  background: rgba(0,200,255,0.08);
  color: var(--accent);
  border: 1px solid rgba(0,200,255,0.3);
  border-radius: 8px; padding: 14px;
  font-size: 13px; font-weight: 700;
  letter-spacing: 2px;
  font-family: 'Share Tech Mono', monospace;
  cursor: pointer; transition: all 0.2s;
  margin-top: 6px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn-login:hover {
  background: rgba(0,200,255,0.15);
  box-shadow: 0 4px 20px rgba(0,200,255,0.15);
  transform: translateY(-1px);
}
.btn-login:active { transform: translateY(0); }

/* Footer */
.card-footer {
  padding: 12px 22px;
  background: var(--bg3);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.footer-status { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--text2); }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
}
.footer-version { font-size: 10px; color: var(--text2); font-family: 'Share Tech Mono', monospace; }
.footer-warn { font-size: 10px; color: rgba(255,170,0,0.6); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Mobile */
@media (max-width: 480px) {
  body { align-items: flex-start; padding-top: clamp(20px,6vh,50px); }
  .card-body { padding: 20px 16px; }
  .card-top, .card-footer { padding: 10px 16px; }
  .corner { width: 80px; height: 80px; }
}

@media (max-height: 600px) and (orientation: landscape) {
  body { align-items: flex-start; padding-top: 8px; }
  .terminal { display: none; }
}
</style>
</head>
<body>

<!-- Background layers (same as dashboard) -->
<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div class="bg-glow"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">

  <!-- Terminal boot sequence -->
  <div class="terminal" id="terminal">
    <div class="terminal-bar">
      <div class="tdot r"></div>
      <div class="tdot y"></div>
      <div class="tdot g"></div>
      <span class="terminal-title">// SYSTEM BOOT</span>
    </div>
    <div class="terminal-body" id="terminal-body">
      <!-- Lines injected by JS -->
    </div>
  </div>

  <!-- Login card -->
  <div class="card" id="login-card">
    <div class="card-top">
      <div class="tdot r"></div>
      <div class="tdot y"></div>
      <div class="tdot g"></div>
      <span class="card-label">// AUTHENTICATION REQUIRED</span>
    </div>

    <div class="card-body">
      <div class="card-logo">
        <div class="card-logo-icon">🛡</div>
        <div class="card-logo-text">
          <div class="card-logo-name">CyberScan<span>Pro</span></div>
          <div class="card-logo-sub">SECURITY ASSESSMENT PLATFORM</div>
        </div>
      </div>

      {% if error %}
      <div class="error">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" autocomplete="off">
        <div class="field">
          <label>// Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" name="username"
                   placeholder="operator_id"
                   autocomplete="username"
                   autocorrect="off"
                   autocapitalize="none"
                   spellcheck="false"
                   autofocus>
          </div>
        </div>

        <div class="field">
          <label>// Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" name="password"
                   id="pass-input"
                   placeholder="••••••••••••"
                   autocomplete="current-password">
            <button type="button" class="toggle-pass" onclick="togglePass()">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-login">▶ AUTHENTICATE</button>
      </form>
    </div>

    <div class="card-footer">
      <div class="footer-status">
        <div class="status-dot"></div>
        System Online · Secure
      </div>
      <div class="footer-version">v1.0.0</div>
      <div class="footer-warn">⚠ Authorized Use Only</div>
    </div>
  </div>

</div>

<script>
// Terminal boot lines
const LINES = [
  { cls: "info",  text: "CyberScan Pro v1.0.0 initializing...",        delay: 100  },
  { cls: "dim",   text: "Loading vulnerability modules...",             delay: 400  },
  { cls: "ok",    text: "[OK] Network scanner engine loaded",           delay: 700  },
  { cls: "ok",    text: "[OK] Web vulnerability tester loaded",         delay: 950  },
  { cls: "ok",    text: "[OK] CVE database connection established",      delay: 1200 },
  { cls: "ok",    text: "[OK] Report generator ready",                  delay: 1450 },
  { cls: "warn",  text: "[!!] Authentication required to proceed",       delay: 1700 },
  { cls: "white", text: "Enter credentials below to access the system.", delay: 1900 },
];

const body = document.getElementById("terminal-body");

LINES.forEach((line, i) => {
  setTimeout(() => {
    // Remove cursor from previous line
    const prev = body.querySelector(".cursor-blink");
    if (prev) prev.remove();

    const el = document.createElement("div");
    el.className = "tline " + line.cls;
    el.style.animationDelay = "0s";
    el.innerHTML = `<span class="prompt">></span><span class="msg">${line.text}</span>`;

    // Add cursor to last line
    if (i === LINES.length - 1) {
      el.innerHTML += `<span class="cursor-blink"></span>`;
    }
    body.appendChild(el);
    body.scrollTop = body.scrollHeight;
  }, line.delay);
});

function togglePass() {
  const inp = document.getElementById("pass-input");
  inp.type = inp.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
