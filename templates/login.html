<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#060c14">
<title>CyberScan Pro — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #060c14;
  --bg2:    #0a1220;
  --bg3:    #0f1a2e;
  --accent: #00c8ff;
  --green:  #00ff9d;
  --red:    #ef4444;
  --text:   #f1f5f9;
  --text2:  #64748b;
  --border: rgba(0,200,255,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  position: relative;
  overflow: hidden;
}

/* Animated background */
.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.bg-glow {
  position: fixed; z-index: 0;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,200,255,0.04) 0%, transparent 70%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* Floating particles */
.particle {
  position: fixed; z-index: 0;
  width: 2px; height: 2px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0.4;
  animation: float linear infinite;
}
@keyframes float {
  from { transform: translateY(100vh); opacity: 0; }
  10%  { opacity: 0.4; }
  90%  { opacity: 0.4; }
  to   { transform: translateY(-20px); opacity: 0; }
}

/* Main container */
.container {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Logo */
.logo-wrap {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, rgba(0,200,255,0.15), rgba(0,200,255,0.05));
  border: 1px solid rgba(0,200,255,0.2);
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 32px;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(0,200,255,0.1);
}
.logo-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: clamp(22px, 6vw, 28px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 2px;
}
.logo-name span { color: var(--accent); }
.logo-sub {
  font-size: 12px;
  color: var(--text2);
  margin-top: 6px;
  letter-spacing: 1px;
}

/* Card */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,200,255,0.05);
}

.card-header {
  background: var(--bg3);
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.dots { display: flex; gap: 6px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.dot.r { background: #ff5f57; }
.dot.y { background: #ffbd2e; }
.dot.g { background: #27c93f; }
.header-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 2px;
  margin-left: 6px;
}

.card-body { padding: 28px 24px; }

/* Error */
.error {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 20px;
  font-size: 13px;
  color: var(--red);
  display: flex; align-items: center; gap: 8px;
}

/* Fields */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.input-wrap {
  position: relative;
  display: flex; align-items: center;
}
.input-icon {
  position: absolute; left: 14px;
  color: var(--text2); font-size: 16px;
  pointer-events: none;
}
.field input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 14px 13px 42px;
  color: var(--text);
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: all 0.2s;
  -webkit-appearance: none;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,200,255,0.08);
  background: rgba(0,200,255,0.02);
}
.field input::placeholder { color: var(--text2); font-size: 14px; }

/* Show/hide password toggle */
.toggle-pass {
  position: absolute; right: 14px;
  background: none; border: none;
  color: var(--text2); font-size: 16px;
  cursor: pointer; padding: 4px;
}

/* Submit */
.btn-login {
  width: 100%;
  background: linear-gradient(135deg, rgba(0,200,255,0.15), rgba(0,200,255,0.08));
  color: var(--accent);
  border: 1px solid rgba(0,200,255,0.3);
  border-radius: 10px;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1.5px;
  font-family: 'Share Tech Mono', monospace;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  position: relative;
  overflow: hidden;
}
.btn-login:hover {
  background: linear-gradient(135deg, rgba(0,200,255,0.25), rgba(0,200,255,0.12));
  box-shadow: 0 4px 20px rgba(0,200,255,0.15);
  transform: translateY(-1px);
}
.btn-login:active { transform: translateY(0); }
.btn-login .btn-icon { margin-right: 8px; }

/* Footer */
.card-footer {
  padding: 14px 24px;
  background: var(--bg3);
  border-top: 1px solid var(--border);
  text-align: center;
}
.footer-text {
  font-size: 11px;
  color: var(--text2);
  line-height: 1.7;
}

/* Status bar */
.status-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 16px; margin-top: 20px; flex-wrap: wrap;
}
.status-item {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text2);
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Mobile */
@media (max-width: 480px) {
  body { padding: 12px; align-items: flex-start; padding-top: clamp(24px, 8vh, 60px); }
  .card-body { padding: 22px 18px; }
  .card-footer, .card-header { padding: 12px 18px; }
  .logo-wrap { margin-bottom: 24px; }
}

@media (max-height: 600px) and (orientation: landscape) {
  body { align-items: flex-start; padding-top: 10px; }
  .logo-wrap { margin-bottom: 16px; }
  .logo-icon { width: 48px; height: 48px; font-size: 24px; }
  .logo-name { font-size: 20px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<!-- Floating particles -->
<div class="particle" style="left:10%;animation-duration:8s;animation-delay:0s;"></div>
<div class="particle" style="left:25%;animation-duration:12s;animation-delay:2s;"></div>
<div class="particle" style="left:50%;animation-duration:9s;animation-delay:4s;"></div>
<div class="particle" style="left:75%;animation-duration:11s;animation-delay:1s;"></div>
<div class="particle" style="left:90%;animation-duration:7s;animation-delay:3s;"></div>

<div class="container">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-icon">🛡</div>
    <div class="logo-name">CyberScan<span>Pro</span></div>
    <div class="logo-sub">SECURITY ASSESSMENT PLATFORM</div>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-header">
      <div class="dots">
        <div class="dot r"></div>
        <div class="dot y"></div>
        <div class="dot g"></div>
      </div>
      <span class="header-label">// SECURE LOGIN</span>
    </div>

    <div class="card-body">
      {% if error %}
      <div class="error">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" autocomplete="off">
        <div class="field">
          <label>Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" name="username"
                   placeholder="Enter username"
                   autocomplete="username"
                   autocorrect="off"
                   autocapitalize="none"
                   spellcheck="false"
                   autofocus>
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" name="password"
                   id="pass-input"
                   placeholder="Enter password"
                   autocomplete="current-password">
            <button type="button" class="toggle-pass" onclick="togglePass()">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-login">
          <span class="btn-icon">▶</span> AUTHENTICATE
        </button>
      </form>
    </div>

    <div class="card-footer">
      <div class="footer-text">
        ⚠ Authorized access only<br>
        Unauthorized use is strictly prohibited
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-item">
      <div class="status-dot"></div>
      <span>System Online</span>
    </div>
    <div class="status-item">
      <div class="status-dot" style="background:var(--accent);box-shadow:0 0 6px var(--accent);"></div>
      <span>Secure Connection</span>
    </div>
    <div class="status-item">
      <span style="color:var(--text2);">v1.0.0</span>
    </div>
  </div>

</div>

<script>
function togglePass() {
  const inp = document.getElementById("pass-input");
  inp.type  = inp.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
